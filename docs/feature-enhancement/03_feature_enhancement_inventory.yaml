execution_phases:
  - id: phase_4a_guardrail_spec
    title: Guardrail and contract specs first
    items:
      - FE-001
      - FE-002
      - FE-007
      - FE-009
    gate: Human review confirms non-claim and contract boundaries.
  - id: phase_4b_workbench_polish_spec
    title: Workbench and Polish product specs
    items:
      - FE-003
      - FE-004
      - FE-005
    gate: FE-001 and FE-002 boundaries are accepted.
  - id: phase_4c_workflow_governance_spec
    title: Agent workflow governance
    items:
      - FE-008
    gate: Governance owner confirms doc-governor or active-docs destination.
  - id: phase_4d_research_and_decision
    title: Research, deferred, and rejected items
    items:
      - FE-006
      - FE-010
      - FE-011
      - FE-012
      - FE-013
      - FE-014
      - FE-015
    gate: No implementation until missing evidence or human confirmation is resolved.

documentation_refresh_rules:
  - Phase 3 inventory is not an active requirement, delivery plan, BACKLOG entry, ADR, or implementation goal.
  - Proposed FE items must be reviewed before entering Spec Kit.
  - Research, deferred, and rejected items must not become implementation tasks.
  - Reference Markdown workflow, schema_like_design, examples, and release notes must stay reference inspiration until project executable evidence exists.
  - Any accepted FE must be handed off through BACKLOG, DELIVERY_PLAN, active docs, or ADR as appropriate.

commit_policy:
  - Do not run git add, git commit, or git push during Phase 3 inventory generation.
  - A future commit for this phase may include only docs/feature-enhancement/03_feature_enhancement_inventory.md and .codex/feature-enhancement/feature_enhancement_inventory.yaml.
  - If git status shows any other changed file, stop and report before commit.

spec_kit_entry_rules:
  allowed:
    - FE-001
    - FE-002
    - FE-003
    - FE-004
    - FE-005
    - FE-007
    - FE-008
    - FE-009
  recommended_first:
    - FE-001
    - FE-002
  needs_confirmation:
    - FE-006
  not_allowed:
    - FE-010
    - FE-011
    - FE-012
    - FE-013
    - FE-014
    - FE-015
  rules:
    - Do not treat this inventory as a Spec Kit specification.
    - Do not convert research, deferred, or rejected items to implementation specs.
    - Do not use reference examples as tests.
    - Do not use release_note_claim as migration evidence.

codex_goal_conversion_policy:
  allowed_after_human_review:
    - proposed FE items with explicit allowlist, forbidden files, validation commands, and non-claim boundary
  disallowed:
    - items with project_evidence_missing unless they are research-only goals
    - rejected items
    - implementation goals derived directly from reference Skill Markdown
  recommended_first_goal_candidates:
    - FE-001
    - FE-002
  required_goal_fields:
    - scope
    - allowed files
    - forbidden files
    - validation commands
    - non-claim boundary
    - rollback or exit strategy

human_review_checklist:
  - Confirm every FE item has project evidence, reference inspiration, target state, validation strategy, category, status, spec_readiness, risk, and acceptance criteria.
  - Confirm NEW_FROM_REFERENCE items with project_evidence_missing are not proposed.
  - Confirm design-only, schema_like_design, examples, and release_note_claim are not treated as executable implementation.
  - Confirm fake, replay, deterministic, and default-off evidence is not described as live-provider quality.
  - Confirm FE-001 and FE-002 should enter Spec Kit first.
  - Confirm FE-006 scope before any Spec Kit entry.
  - Confirm FE-010 through FE-015 remain research, deferred, or rejected.

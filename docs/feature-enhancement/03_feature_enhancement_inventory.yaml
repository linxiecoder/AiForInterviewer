meta:
  id: feature-enhancement-from-reference-skill
  status: draft
  primary_input: docs/feature-enhancement/02b_reuse_synthesis.md
  supporting_inputs:
    - docs/feature-enhancement/01_project_architecture_assessment.md
    - docs/feature-enhancement/02_reference_skill_capability_study.md
    - AGENTS.md
    - docs/00-governance/DOCS_INDEX.md

items:
  - id: FE-001
    title: Capability status and non-claim guard
    category: engineering_guardrail
    status: proposed
    priority: MUST
    source:
      project_candidates:
        - CAND-003
      reference_primitives:
        - RDP-006
        - RDP-017
      reuse_items:
        - REUSE-001
        - REUSE-010
      adoption_briefs:
        - ADB-001
        - ADB-010
      phase3_seeds:
        - FE-SEED-001
        - FE-SEED-007
    problem: Phase 3 and later specs can accidentally upgrade partial, skeleton, design-only, replay, deterministic, fake, or default-off evidence into implemented product claims.
    project_evidence:
      - docs/03-delivery/refactor/CAPABILITY_PRESERVATION_MATRIX.md records implemented, partial, skeleton, and design-only boundaries.
      - tests/api/test_skeleton_guard.py guards skeleton and non-claim wording.
      - scripts/evals/run_eval_gate.py and scripts/evals/run_l5_eval_suite.py produce deterministic or replay regression evidence, not live-provider quality.
      - apps/api/app/application/ai_runtime/runtime_flags.py keeps graph runtime default-off.
    reference_inspiration:
      - RDP-006 non-claim discipline is useful as design-only reference.
      - RDP-017 claim boundary UI wording is design-only until project UI/tests implement it.
    target_state: All future FE specs and user-visible copy preserve evidence status and never convert design-only, replay, deterministic, fake, or default-off signals into live-provider quality claims.
    absorption_mode: adopt
    scope:
      in_scope:
        - status vocabulary
        - non_claims field expectations
        - UI wording rules for low confidence, partial, replay-only, and default-off states
      out_of_scope:
        - live-provider quality evaluation
        - enabling default-off runtime paths
        - broad product copy rewrite without evidence fields
    affected_modules:
      - docs governance
      - eval reporting
      - Workbench and Polish copy surfaces
    likely_files:
      read:
        - docs/03-delivery/refactor/CAPABILITY_PRESERVATION_MATRIX.md
        - tests/api/test_skeleton_guard.py
        - scripts/evals/run_eval_gate.py
        - apps/api/app/application/ai_runtime/runtime_flags.py
      modify_later:
        - docs/03-delivery/BACKLOG.md
        - docs/02-design/API_SPEC.md
        - apps/web/src/pages/interview/InterviewPage.tsx
      do_not_touch:
        - Phase 1, Phase 2, and Phase 2.5 feature-enhancement inputs during Phase 3
        - provider runtime behavior during inventory
    behavior_contract:
      preserve:
        - partial and skeleton remain non-implemented states.
        - fake, replay, deterministic, and default-off remain regression or staging evidence only.
      allowed_changes:
        - add explicit claim boundary fields or wording in future approved specs.
        - add static guards in future implementation windows.
      forbidden_changes:
        - call deterministic eval evidence live-provider quality.
        - call reference Markdown executable implementation.
    validation_strategy:
      baseline:
        - git diff --check for inventory outputs.
        - static search for required evidence vocabulary.
      future_tests_or_checks:
        - static rg guard for forbidden claim upgrades.
        - focused skeleton/non-claim tests.
      what_it_proves:
        - wording and status boundaries are preserved.
      what_it_does_not_prove:
        - model quality
        - provider correctness
    risks:
      - risk: Guard wording may become too conservative and obscure real progress.
        mitigation: Allow stronger status only when backed by project executable_evidence and explicit validation.
    rollback_or_exit_strategy:
      - Revert the specific wording or guardrail spec without touching runtime behavior.
      - Keep existing capability matrix as fallback source.
    dependencies:
      - Existing capability status vocabulary
      - Existing skeleton guard tests
    open_questions:
      - Which UI surfaces should share a common claim boundary helper later?
    spec_readiness: ready
    suggested_spec_boundary: Guardrail-only specification for evidence vocabulary, non-claims, and UI wording rules.
    suggested_goal_boundary: One docs/test guard goal after human approval; no runtime change.
    phase3_decision: proposed
    acceptance_criteria:
      - Every future FE item declares evidence status.
      - No design-only reference artifact is upgraded to executable implementation.
      - No fake, replay, deterministic, or default-off evidence is described as live-provider quality.

  - id: FE-002
    title: Backend/frontend API contract drift guard
    category: engineering_guardrail
    status: proposed
    priority: MUST
    source:
      project_candidates:
        - CAND-002
      reference_primitives:
        - RDP-005
      reuse_items:
        - REUSE-002
      adoption_briefs:
        - ADB-002
      phase3_seeds:
        - FE-SEED-002
    problem: Backend Pydantic envelope fields and frontend TypeScript envelope fields are maintained separately and can drift.
    project_evidence:
      - apps/api/app/schemas/envelope.py contains backend envelope source/confidence/evidence fields.
      - apps/web/src/shared/api/envelope.ts mirrors frontend envelope types by hand.
      - tests/api/test_route_inventory.py provides route snapshot style precedent.
      - apps/api/app/schemas/scoring.py and apps/api/app/schemas/job_match.py contain confidence and evidence-adjacent schema patterns.
    reference_inspiration:
      - RDP-005 evidence/confidence sourcing treats source availability, evidence refs, and low confidence as first-class concepts.
      - Reference evidence is design-only and does not provide executable schema or validation code.
    target_state: Existing envelope-related source, confidence, and evidence fields have a parity guard between backend and frontend before additional product surfaces depend on them.
    absorption_mode: adopt
    scope:
      in_scope:
        - backend/frontend envelope parity
        - static or snapshot guard for field names and claim boundary fields
      out_of_scope:
        - full OpenAPI code generation
        - new generic contract framework
        - provider quality evaluation
    affected_modules:
      - API schemas
      - frontend shared API client
      - Workbench and Polish consumers
    likely_files:
      read:
        - apps/api/app/schemas/envelope.py
        - apps/web/src/shared/api/envelope.ts
        - apps/web/src/shared/api/client.ts
      modify_later:
        - tests/api/test_route_inventory.py
        - apps/web/src/shared/api/envelope.ts
        - apps/api/app/schemas/envelope.py
      do_not_touch:
        - provider runtime implementation
        - dependency and lock files
    behavior_contract:
      preserve:
        - current API envelope semantics
        - frontend error handling expectations
      allowed_changes:
        - add field parity check or snapshot in approved implementation window
      forbidden_changes:
        - broaden API payload shape without active spec approval
        - infer reference schema as project schema
    validation_strategy:
      baseline:
        - read existing backend/frontend envelope files.
      future_tests_or_checks:
        - schema field parity check
        - TypeScript static guard
        - route snapshot review
      what_it_proves:
        - backend/frontend field shape has not drifted.
      what_it_does_not_prove:
        - LLM output quality
        - source truthfulness
    risks:
      - risk: Guard may force premature API generalization.
        mitigation: Start with existing envelope fields only.
    rollback_or_exit_strategy:
      - Remove parity guard if it blocks unrelated changes while keeping existing schema.
    dependencies:
      - FE-001 non-claim vocabulary
    open_questions:
      - Should later work use generated TypeScript types or keep a parity guard for hand-written types?
    spec_readiness: ready
    suggested_spec_boundary: Contract drift guard for existing envelope fields only.
    suggested_goal_boundary: One backend/frontend contract guard slice.
    phase3_decision: proposed
    acceptance_criteria:
      - Spec identifies canonical backend and frontend envelope paths.
      - Future implementation validates parity without claiming provider quality.
      - No reference schema_like_design is treated as executable schema.

  - id: FE-003
    title: Workbench state-aware action routing
    category: product_feature
    status: proposed
    priority: SHOULD
    source:
      project_candidates:
        - CAND-001
      reference_primitives:
        - RDP-003
        - RDP-010
      reuse_items:
        - REUSE-005
      adoption_briefs:
        - ADB-005
      phase3_seeds:
        - FE-SEED-003
    problem: Workbench actions such as send answer, regenerate, view feedback, and next action are state-heavy and hard to audit in a large component.
    project_evidence:
      - apps/web/src/pages/interview/InterviewPage.tsx contains the main Workbench action/state flow.
      - apps/web/src/pages/interview/InterviewPage.test.ts provides TypeScript contract harness evidence.
      - tests/web/test_interview_actions.py guards static action semantics.
    reference_inspiration:
      - RDP-003 mode routing and RDP-010 recommended next action provide design inspiration.
      - Reference command router is a Markdown workflow and must not be copied as runtime implementation.
    target_state: Workbench exposes an auditable view model for recommended next action while preserving distinct regenerate_current_node and new_question semantics.
    absorption_mode: adapt
    scope:
      in_scope:
        - recommended next action view model
        - action label and disabled state rules
        - regenerate_current_node versus new_question distinction
      out_of_scope:
        - new backend command router
        - copying reference command names
        - full Workbench rewrite
    affected_modules:
      - Interview Workbench frontend
      - Polish frontend API consumers
    likely_files:
      read:
        - apps/web/src/pages/interview/InterviewPage.tsx
        - apps/web/src/pages/interview/InterviewPage.test.ts
        - tests/web/test_interview_actions.py
      modify_later:
        - apps/web/src/pages/interview/InterviewPage.tsx
        - apps/web/src/pages/interview/InterviewPage.test.ts
      do_not_touch:
        - backend runtime
        - reference Skill files
    behavior_contract:
      preserve:
        - existing Workbench navigation and question lifecycle semantics
        - regenerate_current_node remains separate from new_question
      allowed_changes:
        - extract action view model in a focused frontend slice
      forbidden_changes:
        - introduce reference command engine
        - change API semantics without contract spec
    validation_strategy:
      baseline:
        - inspect current action guards and contract harness.
      future_tests_or_checks:
        - frontend pure helper tests
        - static action guard updates
      what_it_proves:
        - UI action state is derived consistently.
      what_it_does_not_prove:
        - backend AI quality
    risks:
      - risk: Product action semantics may drift during extraction.
        mitigation: Pin labels, disabled states, and regenerate/new-question separation in tests.
    rollback_or_exit_strategy:
      - Revert view-model extraction while keeping existing component behavior.
    dependencies:
      - FE-001 claim boundary rules
    open_questions:
      - Should FE-003 and FE-004 be one Spec Kit feature or separate frontend/backend specs?
    spec_readiness: partial
    suggested_spec_boundary: Workbench frontend action view model and recommended next action only.
    suggested_goal_boundary: One frontend-only slice unless API changes are explicitly approved.
    phase3_decision: proposed
    acceptance_criteria:
      - Recommended next action is testable from state.
      - Regenerate current node and new question are not conflated.
      - No reference Markdown command router is copied.

  - id: FE-004
    title: Polish progress tree and input readiness gate
    category: product_feature
    status: proposed
    priority: SHOULD
    source:
      project_candidates:
        - CAND-001
        - CAND-005
      reference_primitives:
        - RDP-005
        - RDP-010
      reuse_items:
        - REUSE-006
        - REUSE-018
      adoption_briefs:
        - ADB-006
        - ADB-012
      phase3_seeds:
        - FE-SEED-004
        - FE-SEED-006
    problem: Polish can produce overly complete-looking feedback when inputs are weak, and progress tree next action can be clearer.
    project_evidence:
      - apps/api/app/application/polish/feedback_validation.py contains warnings and validation boundaries.
      - apps/api/app/domain/polish/policies/source_support_policy.py defines source support levels.
      - apps/api/app/application/polish/canonical_evidence.py tracks evidence refs and blocking issues.
      - Workbench/Polish progress tree has partial frontend evidence.
    reference_inspiration:
      - RDP-005 evidence/confidence sourcing.
      - RDP-010 gated progression and next action design.
      - Transcript quality concepts remain research and are not included here.
    target_state: Polish and Workbench surface input readiness, missing evidence, low confidence, redo gate, and next action without claiming full quality.
    absorption_mode: adapt
    scope:
      in_scope:
        - input readiness notice
        - low confidence and missing evidence behavior
        - progress tree next action and redo gate
      out_of_scope:
        - transcript ingestion
        - Training as a new product flow
        - automatic outcome calibration
    affected_modules:
      - Polish feedback
      - Workbench frontend
      - source support policy
    likely_files:
      read:
        - apps/api/app/application/polish/feedback_validation.py
        - apps/api/app/domain/polish/policies/source_support_policy.py
        - apps/api/app/application/polish/canonical_evidence.py
        - apps/web/src/pages/interview/InterviewPage.tsx
      modify_later:
        - apps/api/app/application/polish/feedback_validation.py
        - apps/web/src/pages/interview/InterviewPage.tsx
        - apps/web/src/pages/interview/InterviewPage.test.ts
      do_not_touch:
        - transcript parser paths unless separately approved
        - Training routes as MVP product flow
    behavior_contract:
      preserve:
        - feedback validation warnings remain non-claim boundaries.
        - low confidence does not block all use by default unless specified.
      allowed_changes:
        - show readiness and next action based on existing evidence fields.
      forbidden_changes:
        - claim complete feedback when evidence is insufficient.
        - introduce transcript ingestion under this FE.
    validation_strategy:
      baseline:
        - read existing feedback validation and source support policy.
      future_tests_or_checks:
        - API warning tests
        - UI notice state tests
        - contract tests for low confidence fields
      what_it_proves:
        - input readiness and next action boundaries are visible and testable.
      what_it_does_not_prove:
        - transcript quality
        - live-provider quality
    risks:
      - risk: Readiness gate may be implemented as hard block and hurt workflow.
        mitigation: Specify low-confidence continue path where product allows it.
    rollback_or_exit_strategy:
      - Remove readiness UI while preserving backend warnings.
    dependencies:
      - FE-001
      - FE-002
    open_questions:
      - Should low-readiness state block generation or allow continue with explicit low confidence?
    spec_readiness: partial
    suggested_spec_boundary: Polish and Workbench readiness/next-action behavior only.
    suggested_goal_boundary: Split backend warning contract and frontend rendering if needed.
    phase3_decision: proposed
    acceptance_criteria:
      - Input insufficiency produces low confidence or missing evidence state.
      - Transcript ingestion remains out of scope.
      - Progress tree next action is auditable.

  - id: FE-005
    title: Feedback correction capture loop
    category: product_feature
    status: proposed
    priority: SHOULD
    source:
      project_candidates:
        - CAND-005
      reference_primitives:
        - RDP-011
      reuse_items:
        - REUSE-007
      adoption_briefs:
        - ADB-007
      phase3_seeds:
        - FE-SEED-005
    problem: Users can identify incorrect feedback, missing facts, or misunderstood context, but correction is not yet a first-class audited input.
    project_evidence:
      - apps/api/app/application/polish/feedback_validation.py has warning and validation structures.
      - tests/api/test_polish_feedback_validation.py and tests/api/test_polish_feedback_generation_service.py cover feedback validation and non-success boundaries.
      - apps/api/app/application/llm/provider_boundary.py provides redaction guard evidence.
    reference_inspiration:
      - RDP-011 human correction loop suggests capture first and analyze later.
      - Reference does not provide executable correction persistence or calibration engine.
    target_state: Polish feedback can capture user correction note, source refs, and review state without claiming automatic learning or calibration.
    absorption_mode: adapt
    scope:
      in_scope:
        - correction note capture
        - source refs and review state
        - non-claim wording for correction use
      out_of_scope:
        - automatic calibration
        - model fine-tuning
        - outcome prediction
    affected_modules:
      - Polish feedback
      - Workbench feedback UI
      - provider redaction boundary
    likely_files:
      read:
        - apps/api/app/application/polish/feedback_validation.py
        - tests/api/test_polish_feedback_validation.py
        - apps/api/app/application/llm/provider_boundary.py
      modify_later:
        - apps/api/app/schemas/polish.py
        - apps/api/app/application/polish/feedback_validation.py
        - apps/web/src/pages/interview/InterviewPage.tsx
      do_not_touch:
        - training flow
        - model provider transport
    behavior_contract:
      preserve:
        - correction is user-provided evidence, not automatic truth.
        - sensitive content remains redacted where appropriate.
      allowed_changes:
        - add correction capture contract in approved spec.
      forbidden_changes:
        - claim automatic calibration or learning from correction.
    validation_strategy:
      baseline:
        - review current feedback validation and redaction boundaries.
      future_tests_or_checks:
        - API schema tests
        - UI state tests
        - redaction checks
      what_it_proves:
        - correction payload is captured and bounded.
      what_it_does_not_prove:
        - calibration quality
        - model improvement
    risks:
      - risk: Correction may contain sensitive data.
        mitigation: Reuse redaction and source boundary policy.
    rollback_or_exit_strategy:
      - Disable correction capture UI while preserving existing feedback flow.
    dependencies:
      - FE-001
    open_questions:
      - What is the minimum correction action: inaccurate flag, fact supplement, free-text note, or phased combination?
    spec_readiness: partial
    suggested_spec_boundary: Capture and review state only; no automatic learning.
    suggested_goal_boundary: One API/UI correction capture slice after spec approval.
    phase3_decision: proposed
    acceptance_criteria:
      - Correction capture has source refs and review state.
      - Automatic calibration claim is forbidden.
      - Redaction boundary is specified.

  - id: FE-006
    title: Existing-surface consistency guard
    category: product_feature
    status: needs_confirmation
    priority: COULD
    source:
      project_candidates:
        - CAND-001
        - CAND-005
      reference_primitives:
        - RDP-013
      reuse_items:
        - REUSE-008
      adoption_briefs:
        - ADB-008
      phase3_seeds:
        - FE-SEED-010
    problem: Resume, Job, Assets, and Polish can drift in source facts, JD binding, or reusable evidence references.
    project_evidence:
      - Resume, Job, Assets, and Polish surfaces exist with partial evidence.
      - LinkedIn, outreach, salary, and full storybank surfaces are not project evidence.
    reference_inspiration:
      - RDP-013 cross-surface consistency suggests shared positioning and story source boundaries.
      - Reference storybank and outreach surfaces are design-only and out of current project scope.
    target_state: Existing surfaces share source refs and JD binding consistency without expanding into missing reference surfaces.
    absorption_mode: adapt
    scope:
      in_scope:
        - Resume/Job/Assets/Polish consistency only
        - source refs and JD binding checks
      out_of_scope:
        - LinkedIn
        - outreach
        - salary negotiation
        - storybank lifecycle
    affected_modules:
      - Resume
      - Job
      - Assets
      - Polish
    likely_files:
      read:
        - apps/api/app/api/v1/assets.py
        - apps/api/app/api/v1/bindings.py
        - apps/api/app/api/v1/polish.py
      modify_later:
        - docs/02-design/API_SPEC.md
        - tests/api/test_assets_weaknesses_api.py
        - tests/api/test_bindings_api.py
      do_not_touch:
        - missing reference-only surfaces
        - storybank schema
    behavior_contract:
      preserve:
        - current entity ownership and owner scope.
      allowed_changes:
        - add consistency validation over existing surfaces after confirmation.
      forbidden_changes:
        - create LinkedIn/outreach/salary surfaces from reference docs.
        - claim Assets already implement storybank.
    validation_strategy:
      baseline:
        - confirm active product surface boundaries.
      future_tests_or_checks:
        - API contract tests
        - static consistency checks
      what_it_proves:
        - existing surface references are consistent.
      what_it_does_not_prove:
        - storybank lifecycle
        - absent surface implementation
    risks:
      - risk: Scope may expand into reference-only product areas.
        mitigation: Require human confirmation before Spec Kit entry.
    rollback_or_exit_strategy:
      - Keep FE as research/deferred if surface boundary is not confirmed.
    dependencies:
      - FE-001
    open_questions:
      - Should Assets be included only as existing assets, excluding storybank-like semantics?
    spec_readiness: partial
    suggested_spec_boundary: Existing surfaces only; no missing reference surfaces.
    suggested_goal_boundary: Do not create Codex Goal until human confirms scope.
    phase3_decision: needs_confirmation
    acceptance_criteria:
      - Human confirms exact surfaces before Spec Kit.
      - No missing reference-only surfaces are introduced.
      - Storybank remains deferred unless separately approved.

  - id: FE-007
    title: Examples as behavior-contract seeds
    category: engineering_guardrail
    status: proposed
    priority: SHOULD
    source:
      project_candidates:
        - CAND-003
      reference_primitives:
        - RDP-016
      reuse_items:
        - REUSE-003
      adoption_briefs:
        - ADB-003
      phase3_seeds:
        - FE-SEED-008
    problem: Reference examples are useful for behavior intent but can be mistaken for executable tests.
    project_evidence:
      - Project has pytest and TypeScript test surfaces that can later turn selected examples into real tests.
      - No reference tests, scripts, evals, schemas, contracts, or validation harness were found in Phase 2.
    reference_inspiration:
      - RDP-016 examples as behavior-contract seed.
      - Reference examples are design-only.
    target_state: Examples may seed acceptance wording and future golden cases, but only project tests can become executable_evidence.
    absorption_mode: adopt
    scope:
      in_scope:
        - acceptance wording
        - golden case intent
        - manual review examples
      out_of_scope:
        - treating examples as tests
        - copying examples into production prompts without review
    affected_modules:
      - test design
      - Spec Kit acceptance criteria
      - docs governance
    likely_files:
      read:
        - docs/feature-enhancement/02_reference_skill_capability_study.md
        - docs/feature-enhancement/02b_reuse_synthesis.md
      modify_later:
        - future Spec Kit spec files
        - future focused tests
      do_not_touch:
        - production prompts during inventory
        - reference Skill files
    behavior_contract:
      preserve:
        - examples remain design-only until translated into project tests.
      allowed_changes:
        - cite example intent in acceptance criteria.
      forbidden_changes:
        - claim reference examples are executable validation.
    validation_strategy:
      baseline:
        - mark reference examples as design-only.
      future_tests_or_checks:
        - project-owned pytest or TypeScript tests for selected examples.
      what_it_proves:
        - acceptance intent is traceable.
      what_it_does_not_prove:
        - current runtime behavior
    risks:
      - risk: Reference product assumptions may leak into AiForInterviewer.
        mitigation: Require product review before turning any example into a fixture.
    rollback_or_exit_strategy:
      - Drop unsuitable example seeds without affecting code.
    dependencies:
      - FE-001
    open_questions:
      - Which examples, if any, fit current Polish and Workbench semantics?
    spec_readiness: ready
    suggested_spec_boundary: Acceptance-seed policy only.
    suggested_goal_boundary: No standalone implementation goal; attach to later FE specs.
    phase3_decision: proposed
    acceptance_criteria:
      - Reference examples are labeled design-only.
      - Future executable evidence requires project tests.
      - Examples do not bypass product review.

  - id: FE-008
    title: Lazy reference loading and doc-governor command matrix
    category: agent_workflow
    status: proposed
    priority: SHOULD
    source:
      project_candidates:
        - CAND-003
      reference_primitives:
        - RDP-002
        - RDP-004
        - RDP-018
      reuse_items:
        - REUSE-004
        - REUSE-017
      adoption_briefs:
        - ADB-004
        - ADB-011
      phase3_seeds:
        - FE-SEED-009
    problem: AI and developers can read too broadly or run disallowed commands when feature-enhancement work spans many docs and tools.
    project_evidence:
      - tools/doc_governor/cli.py provides project command governance surface.
      - package.json and apps/web/package.json record developer command entry points.
      - AGENTS.md and DOCS_INDEX.md define active docs and command constraints.
    reference_inspiration:
      - RDP-002 command registry and file routing.
      - RDP-004 lazy reference loading.
      - Reference command docs are Markdown workflow, not executable command engines.
    target_state: Task-type command matrix and lazy reading packet guide future agents without creating parallel planning systems.
    absorption_mode: adapt
    scope:
      in_scope:
        - task-type read packet
        - allowed and forbidden command matrix
        - doc-governor handoff
      out_of_scope:
        - implementing a runtime command router
        - running build/test/install in prohibited windows
    affected_modules:
      - doc governor
      - agent workflow docs
      - developer command documentation
    likely_files:
      read:
        - tools/doc_governor/cli.py
        - package.json
        - apps/web/package.json
        - docs/00-governance/DOCS_INDEX.md
      modify_later:
        - docs/00-governance/AI_WORKFLOW.md
        - docs/00-governance/DOCS_GOVERNANCE.md
        - tools/doc_governor/cli.py
      do_not_touch:
        - CI workflows during inventory
        - lockfiles
    behavior_contract:
      preserve:
        - active docs remain the source of governance truth.
      allowed_changes:
        - document or validate command routing in approved governance slice.
      forbidden_changes:
        - treat reference Markdown commands as executable enforcement.
        - create new roadmap or parallel task entry.
    validation_strategy:
      baseline:
        - static review of command entry points.
      future_tests_or_checks:
        - doc governor check or preview
        - static rg for forbidden parallel plan entries
      what_it_proves:
        - workflow constraints are discoverable.
      what_it_does_not_prove:
        - runtime behavior
    risks:
      - risk: Matrix can drift from package scripts.
        mitigation: Keep future command matrix close to doc-governor or package script evidence.
    rollback_or_exit_strategy:

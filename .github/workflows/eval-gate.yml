name: Eval Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase9-eval-gate:
    name: Phase 9 replay eval gate
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run eval tests
        run: python -m pytest tests/evals -q

      - name: Run Phase 9 replay eval gate
        run: python scripts/evals/run_eval_gate.py --suite phase9 --mode replay --report-dir "$RUNNER_TEMP/aifi-eval-reports"

      - name: Run Phase 9 negative-control gate
        run: python scripts/evals/run_eval_gate.py --suite phase9 --mode replay --expect-fail-fixture

      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase9-eval-reports
          path: ${{ runner.temp }}/aifi-eval-reports
          if-no-files-found: ignore
